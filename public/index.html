<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokopia Checklist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">📋</span>
        <h1>Pokopia <span>Checklist</span></h1>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-label"><span id="progress-text">0 / 0</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
      <div class="auth-section" id="auth-section"></div>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <div class="search-box">
        <input type="text" id="search" placeholder="Search items...">
      </div>

      <div class="filter-section">
        <h3>Filter</h3>
        <select id="filter-found">
          <option value="">All Items</option>
          <option value="false">Not Found</option>
          <option value="true">Found</option>
        </select>
      </div>

      <div class="filter-section">
        <h3>Region</h3>
        <div id="region-filters" class="pill-group"></div>
      </div>

      <div class="filter-section">
        <h3>Category</h3>
        <div id="category-filters" class="category-list"></div>
      </div>
    </aside>

    <section class="content">
      <div class="content-header">
        <h2 id="content-title">All Items</h2>
        <span class="item-count" id="item-count"></span>
      </div>
      <div class="card-grid" id="card-grid"></div>
    </section>
  </main>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="auth-modal-overlay">
    <div class="modal auth-modal">
      <button class="modal-close" id="auth-modal-close">&times;</button>
      <div id="auth-modal-content">
        <div class="modal-title" id="auth-title">Log In</div>
        <form id="auth-form">
          <input type="email" id="auth-email" placeholder="Email" required>
          <input type="password" id="auth-password" placeholder="Password" required>
          <div class="auth-error" id="auth-error"></div>
          <button type="submit" class="auth-submit" id="auth-submit">Log In</button>
        </form>
        <p class="auth-switch">
          <span id="auth-switch-text">Don't have an account?</span>
          <button id="auth-switch-btn" type="button">Sign Up</button>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
